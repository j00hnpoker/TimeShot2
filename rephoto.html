<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--bg:#15181d;--panel:#1b1f26;--ink:#e9e7e0;--muted:#8a8f99;--line:rgba(233,231,224,.16);
  --accent:#d98a3d;--lock:#46c46b;--warn:#d2643f;--pub:#5b9bd5;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans)}
body{display:flex;flex-direction:column;height:100dvh;overflow:hidden;overscroll-behavior:none}
header{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top)+10px) 14px 10px;border-bottom:1px solid var(--line);z-index:20}
header h1{font:700 14px/1 var(--mono);letter-spacing:.06em;margin:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header h1 span{color:var(--accent)}
.back{appearance:none;border:0;background:transparent;color:var(--ink);font-size:22px;cursor:pointer;padding:2px 6px;display:none}.back.on{display:block}
.seg{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font:600 11px/1 var(--mono)}
.seg button{appearance:none;border:0;background:transparent;color:var(--muted);padding:6px 12px;cursor:pointer}
.seg button[aria-pressed=true]{background:var(--ink);color:var(--bg)}
.view{flex:1;min-height:0;display:none;flex-direction:column}.view.on{display:flex}
#viewHub{position:relative}#viewCam{overflow:hidden}#viewTag{overflow-y:auto}
.scroll{overflow-y:auto;flex:1}.pad{padding:16px;display:flex;flex-direction:column;gap:12px}
.btn{appearance:none;border:1px solid var(--line);background:transparent;color:var(--ink);font:500 14px/1 var(--sans);padding:14px;border-radius:12px;cursor:pointer;width:100%;transition:border-color .15s,background .15s,opacity .15s;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.btn:active{background:rgba(233,231,224,.06)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.accent{border-color:var(--accent);color:var(--accent)}.btn.danger{border-color:var(--warn);color:var(--warn)}.btn.go{border-color:var(--lock);color:var(--lock)}
.btn.sm{padding:10px 14px;font-size:13px}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#map{flex:1;min-height:0}
.locbtn{position:absolute;right:16px;bottom:20px;z-index:401;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--pub);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.5)}

  /* Modal */
.modal{position:fixed;inset:0;z-index:1100;display:flex;align-items:flex-end;background:rgba(0,0,0,.72)}.modal.hide{display:none}
.mbox{background:var(--panel);border-top:1px solid var(--line);border-radius:20px 20px 0 0;padding:24px 20px calc(env(safe-area-inset-bottom)+20px);width:100%;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:90dvh}
.mbox h2{font:700 14px/1 var(--mono);letter-spacing:.06em;margin:0;color:var(--accent)}
.mhint{font:12px/1.6 var(--mono);color:var(--muted);padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(233,231,224,.03);transition:border-color .2s}
.mhint.perso{border-color:rgba(217,138,61,.3)}
.mhint b{color:var(--ink)}
input[type=text]{background:#0f1216;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:13px;font:15px var(--sans);width:100%}
input[type=text].err{border-color:var(--warn)}input[type=text]:focus{border-color:var(--accent);outline:none}
.empty{margin:auto;text-align:center;color:var(--muted);padding:40px;font-size:14px;line-height:1.7}
.card{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:13px;padding:10px;cursor:pointer}
.card:active{border-color:var(--accent)}
.card img{width:60px;height:60px;border-radius:9px;object-fit:cover;background:#000;flex:0 0 60px}
.card .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .sub{font:11px/1.4 var(--mono);color:var(--muted);margin-top:3px}.card .sub b{color:var(--accent);font-weight:500}
.pill{font:10px/1 var(--mono);color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 8px}
.pill.com{color:var(--pub);border-color:var(--pub)}
/* Stage */
.stage{position:relative;flex:1;min-height:220px;background:#000;overflow:hidden}
#video,#ghost,#captured{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#ghost{opacity:.4;pointer-events:none;display:none}#captured{display:none;z-index:5}
#prevCanvas{position:absolute;inset:0;display:none;z-index:6}
.reticle{position:absolute;inset:0;pointer-events:none}
.reticle .h,.reticle .v{position:absolute;background:var(--line)}
.reticle .h{left:0;right:0;height:1px}.reticle .v{top:0;bottom:0;width:1px}
.reticle .h.t{top:33.33%}.reticle .h.b{top:66.66%}.reticle .v.l{left:33.33%}.reticle .v.r{left:66.66%}
.qsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4;overflow:visible;opacity:0;transition:opacity .25s}
.qsvg polygon{stroke-width:1.5;vector-effect:non-scaling-stroke;stroke-linejoin:round;transition:fill .15s,stroke .15s}.qsvg path{vector-effect:non-scaling-stroke;transition:stroke .15s}.hero{cursor:zoom-in}
.fhud{position:absolute;top:10px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:5;pointer-events:none}.fhud.hide{display:none}
.fscore{font:600 36px/1 var(--mono);text-shadow:0 2px 12px #000}.fscore small{font-size:15px;opacity:.6}
.finstr{font:700 12px/1 var(--mono);letter-spacing:.07em;color:var(--ink);background:rgba(0,0,0,.5);padding:7px 14px;border-radius:999px;text-shadow:0 1px 4px #000;min-height:14px}
.sensors{position:absolute;top:10px;left:10px;display:flex;gap:8px;z-index:6}
.chip{font:10px/1 var(--mono);background:rgba(0,0,0,.55);padding:6px 9px;border-radius:8px;color:var(--muted)}.chip b{color:var(--lock)}.chip.w b{color:var(--accent)}.chip.e b{color:var(--warn)}
.prev-label{position:absolute;top:10px;right:10px;z-index:7;font:600 11px/1 var(--mono);background:rgba(0,0,0,.6);padding:6px 10px;border-radius:8px;color:var(--accent);user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.overlay{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:28px;text-align:center;background:rgba(10,12,15,.84)}.overlay.hide{display:none}.overlay p{margin:0;max-width:280px;color:var(--muted);font-size:13px;line-height:1.5}
.spin{width:28px;height:28px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
@media(prefers-reduced-motion:reduce){.spin{animation:none}}@keyframes sp{to{transform:rotate(360deg)}}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:8}
@media(prefers-reduced-motion:no-preference){.flash.go{animation:fl .35s ease-out}}@keyframes fl{0%{opacity:.85}100%{opacity:0}}
.dock{padding:12px 16px calc(env(safe-area-inset-bottom)+14px);background:var(--panel);border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.row{display:flex;align-items:center;gap:10px}
.slider{display:flex;align-items:center;gap:12px;font:11px/1 var(--mono);color:var(--muted)}.slider label{min-width:64px}.slider output{min-width:34px;text-align:right;color:var(--accent)}
input[type=range]{flex:1;appearance:none;height:2px;background:var(--line);border-radius:2px;margin:0}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ink);border:3px solid var(--bg);box-shadow:0 0 0 1px var(--line)}
.icon{flex:0 0 46px;height:46px;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:11px;font-size:16px;cursor:pointer}
.shutter{flex:0 0 62px;height:62px;border-radius:50%;border:2px solid var(--ink);background:var(--ink);cursor:pointer;align-self:center;transition:transform .1s,background .15s,border-color .15s}
.shutter:active{transform:scale(.92)}.shutter:disabled{opacity:.4;cursor:not-allowed}.shutter.lk{background:var(--lock);border-color:var(--lock)}
.note{font:11px/1.45 var(--mono);color:var(--muted);user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}.hide{display:none!important}
/* Tag */
.hero{width:100%;aspect-ratio:4/3;object-fit:cover;background:#000;border-radius:13px}
#player{width:100%;aspect-ratio:4/3;background:#000;border-radius:13px;display:none}
.ts-dates{background:rgba(233,231,224,.04);border:1px solid var(--line);border-radius:12px;padding:12px;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font:12px/1.5 var(--mono);color:var(--muted)}
.ts-dates b{color:var(--ink);font-weight:500}
.facts{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font:12px/1.5 var(--mono);color:var(--muted)}.facts b{color:var(--ink);font-weight:500}
.series{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.series .it{position:relative;flex:0 0 auto}.series img{height:72px;border-radius:8px;object-fit:cover;background:#000;display:block}
.series .ck{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:5px;background:rgba(0,0,0,.6);border:1px solid var(--line);color:var(--lock);font-size:13px;display:flex;align-items:center;justify-content:center}
.series .it.off img{opacity:.4}.series .it.off .ck{color:var(--muted)}
.type-pill{display:inline-block;font:600 10px/1 var(--mono);padding:6px 10px;border-radius:999px;border:1px solid currentColor}
.type-pill.com{color:var(--pub)}.type-pill.perso{color:var(--muted)}
.sync-ok{font:10px/1 var(--mono);color:var(--lock);opacity:.6}
.lbx{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;overflow:scroll;-webkit-overflow-scrolling:touch}.lbx.hide{display:none}.lbx img{max-width:100%;max-height:100%;object-fit:contain;touch-action:pinch-zoom;user-select:none}.lbxX{position:absolute;top:calc(env(safe-area-inset-top)+14px);right:18px;background:transparent;border:0;color:#fff;font-size:28px;cursor:pointer;line-height:1;padding:4px}
.lbx-nav{position:absolute;bottom:calc(env(safe-area-inset-bottom)+14px);left:0;right:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:0 16px}
.lbx-nav button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:50%;width:46px;height:46px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lbx-nav button:disabled{opacity:.25;cursor:not-allowed}
#lbxDel{background:rgba(210,100,63,.25);border-color:var(--warn);color:var(--warn)}
.lbx-nav span{color:rgba(255,255,255,.7);font:11px/1 var(--mono);min-width:44px;text-align:center}
.auth-btn{appearance:none;border:1px solid var(--line);background:transparent;color:var(--muted);font:600 10px/1 var(--mono);padding:6px 10px;border-radius:999px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.auth-btn.on{color:var(--lock);border-color:var(--lock)}
</style>
</head>
<body>
<div id="errBox" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#d2643f;color:#fff;font:12px/1.5 monospace;padding:12px;white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow:auto;box-shadow:0 2px 12px rgba(0,0,0,.5)">
  <b style="font-size:13px">⚠ Erreur JavaScript</b><br><span id="errMsg"></span>
  <button onclick="document.getElementById('errBox').style.display='none'" style="margin-top:8px;background:#fff;color:#d2643f;border:0;border-radius:6px;padding:6px 12px;font-weight:bold">Fermer</button>
</div>
<script>
(function(){
  function showErr(msg){
    var b=document.getElementById("errBox"),m=document.getElementById("errMsg");
    if(b&&m){m.textContent=(m.textContent?m.textContent+"\n\n":"")+msg;b.style.display="block";}
  }
  window.addEventListener("error",function(e){
    var msg=e.message||"Erreur inconnue";
    if(e.filename)msg+="\n@ "+e.filename.split("/").pop()+":"+e.lineno+":"+e.colno;
    if(e.error&&e.error.stack)msg+="\n"+e.error.stack.split("\n").slice(0,3).join("\n");
    showErr(msg);
  });
  window.addEventListener("unhandledrejection",function(e){
    var r=e.reason;showErr("Promise rejetée: "+((r&&r.message)?r.message:String(r))+((r&&r.stack)?"\n"+r.stack.split("\n").slice(0,3).join("\n"):""));
  });
  window.__showErr=showErr;
})();
</script>

const PW=480;

async function startCam(){
  stopCam();
  const v=$("video");

    // Rendre la vidéo visible AVANT d'attacher le flux (sinon écran noir Android)
    v.style.visibility="visible";v.removeAttribute("hidden");
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:960}},audio:false});

    await new Promise(res=>{
      let done=false;const finish=()=>{if(!done){done=true;res();}};
      if(v.readyState>=2)finish();
      v.onloadedmetadata=finish;
      setTimeout(finish,800);// filet de sécurité

    await v.play().catch(()=>{});

    v.style.transform="translateZ(0)";requestAnimationFrame(()=>{v.style.transform="";});
    camReady=true;$("camOv").classList.add("hide");$("shutter").disabled=false;

    $("spin").classList.add("hide");
    $("camMsg").textContent="Caméra inaccessible ("+e.name+")";
    $("camRetry").classList.remove("hide");$("camOv").classList.remove("hide");

}

function floop(){if(!following)return;if(fbusy||!fdes){setTimeout(floop,120);return;}fbusy=true;let f=null,kp=null,des=null,mk=null,mt=null,sM=null,dM=null,H=null;const done=()=>{[f&&f.gray,kp,des,mk,mt,sM,dM,H].forEach(o=>{try{o&&o.delete&&o.delete();}catch(_){}});fbusy=false;setTimeout(floop,flocked?180:85);};try{f=liveMat();if(!f){fbusy=false;setTimeout(floop,150);return;}mk=new cv.Mat();kp=new cv.KeyPointVector();des=new cv.Mat();fOrb.detectAndCompute(f.gray,mk,kp,des);if(des.rows<8){floseLost();return done();}mt=new cv.DMatchVectorVector();fBf.knnMatch(fdes,des,mt,2);const sa=[],da=[];for(let i=0;i<mt.size();i++){const mv=mt.get(i);if(mv.size()<2)continue;const x=mv.get(0),y=mv.get(1);if(x.distance<0.80*y.distance){const rp=fkp[x.queryIdx];if(!rp)continue;sa.push(rp[0],rp[1]);const p=kp.get(x.trainIdx).pt;da.push(p.x,p.y);}}if(sa.length/2<8){floseLost();return done();}sM=cv.matFromArray(sa.length/2,1,cv.CV_32FC2,sa);dM=cv.matFromArray(da.length/2,1,cv.CV_32FC2,da);H=cv.findHomography(sM,dM,cv.RANSAC,5);if(H.empty()||H.rows!==3){floseLost();return done();}const h=H.data64F;if(!fsmH)fsmH=Array.from(h);else{for(let i=0;i<9;i++)fsmH[i]=fsmH[i]*0.35+h[i]*0.65;}const W=fdims[0],Hh=fdims[1];const c=[[0,0],[W,0],[W,Hh],[0,Hh]].map(p=>projectPt(fsmH,p[0],p[1]));const flat=c.flatMap(p=>p);if(!quadOk(flat,W,Hh)){floseLost();return done();}const refs=[0,0,W,0,W,Hh,0,Hh];let err=0;for(let i=0;i<4;i++)err+=Math.hypot(flat[i*2]-refs[i*2],flat[i*2+1]-refs[i*2+1]);err/=4;const sc=Math.round(100*Math.exp(-2.8*err/Math.hypot(W,Hh)));const cx=(flat[0]+flat[2]+flat[4]+flat[6])/4,cy=(flat[1]+flat[3]+flat[5]+flat[7])/4,dx=cx-W/2,dy=cy-Hh/2;const projW=Math.hypot(flat[2]-flat[0],flat[3]-flat[1]),scale=projW/W;const rot=Math.atan2(flat[3]-flat[1],flat[2]-flat[0])*180/Math.PI;fmiss=0;fdraw(sc,dx,dy,scale,rot);return done();}catch(e){return done();}}
function floseLost(){fmiss++;$("qsvg").style.opacity="0";if(fmiss>3){fsmH=null;$("fscore").innerHTML='<small style="font-size:13px;opacity:.5">cherche…</small>';$("fscore").style.color="var(--muted)";$("finstr").textContent="bouge lentement vers le sujet";flocked=false;$("shutter").classList.remove("lk");}}
function fdraw(sc,dx,dy,scale,rot){const v=$("video"),vw=v.videoWidth,vh=v.videoHeight,sw=$("stage").clientWidth,sh=$("stage").clientHeight;if(!vw||!fsmH)return;const W=fdims[0],Hh=fdims[1],scl=Math.max(sw/vw,sh/vh),ox=(sw-vw*scl)/2,oy=(sh-vh*scl)/2,m=(vw/PW)*scl;const pts=[[0,0],[W,0],[W,Hh],[0,Hh]].map(p=>{const q=projectPt(fsmH,p[0],p[1]);return`${(q[0]*m+ox).toFixed(1)},${(q[1]*m+oy).toFixed(1)}`;});$("qpoly").setAttribute("points",pts.join(" "));const fc=sc>=88?"rgba(70,196,107,.16)":sc>=55?"rgba(217,138,61,.10)":"rgba(210,100,63,.13)";const sk=sc>=88?"#46c46b":sc>=55?"#d98a3d":"#d2643f";$("qpoly").setAttribute("fill",fc);$("qpoly").setAttribute("stroke",sk);const cp=[[0,0],[W,0],[W,Hh],[0,Hh]].map(p=>{const q=projectPt(fsmH,p[0],p[1]);return[q[0]*m+ox,q[1]*m+oy];});const AF=0.22;function lrp(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];}function lsh(c,a,b){const pa=lrp(c,a,AF),pb=lrp(c,b,AF);return`M${pa[0].toFixed(1)},${pa[1].toFixed(1)}L${c[0].toFixed(1)},${c[1].toFixed(1)}L${pb[0].toFixed(1)},${pb[1].toFixed(1)}`;}const cd=[lsh(cp[0],cp[1],cp[3]),lsh(cp[1],cp[0],cp[2]),lsh(cp[2],cp[3],cp[1]),lsh(cp[3],cp[2],cp[0])].join(" ");$("qcorners").setAttribute("d",cd);$("qcorners").setAttribute("stroke",sk);$("qsvg").style.opacity="1";$("fscore").innerHTML=Math.round(sc)+'<small>%</small>';$("fscore").style.color=sk;let instr;if(sc>=88){instr="aligné — déclenche !";}else{const diag=Math.hypot(W,Hh);const devs=[{v:Math.abs(scale-1)/0.13,t:scale>1?"RECULE":"AVANCE"},{v:Math.abs(rot)/13,t:rot>0?"TOURNE DROITE":"TOURNE GAUCHE"},{v:Math.abs(dx)/(diag*0.08),t:dx>0?"PAS À DROITE":"PAS À GAUCHE"},{v:Math.abs(dy)/(diag*0.08),t:dy>0?"DESCEND":"MONTE"}].filter(d=>d.v>1).sort((a,b)=>b.v-a.v);instr=devs.length?devs[0].t:sc>60?"affine la position":"cadre la scène";}$("finstr").textContent=instr;flocked=sc>=90;fLastScore=sc;$("shutter").classList.toggle("lk",sc>=88);}

// ── Preview automatique ───────────────────────────────────────────────────
let prevTimer=null,prevFrames=[],prevIdx=0;
function stopPrev(){if(prevTimer){clearInterval(prevTimer);prevTimer=null;}prevFrames=[];prevIdx=0;}
async function buildPreview(newData){
  stopPrev();
  const load=s=>new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=s;});
  const W=320;
  const canvases=[];
  const phIds=[activeTS.refId,...activeTS.frames];
  for(const phId of phIds){const ph=await store.get("ph:"+phId);if(!ph)continue;const im=await load(ph.data);const s=Math.min(1,W/Math.max(im.width,im.height));const c=document.createElement("canvas");c.width=Math.round(im.width*s);c.height=Math.round(im.height*s);c.getContext("2d").drawImage(im,0,0,c.width,c.height);canvases.push(c);}
  const newIm=await load(newData);const sn=Math.min(1,W/Math.max(newIm.width,newIm.height));const nc=document.createElement("canvas");const targetW=canvases.length?canvases[0].width:Math.round(newIm.width*sn);const targetH=canvases.length?canvases[0].height:Math.round(newIm.height*sn);nc.width=targetW;nc.height=targetH;nc.getContext("2d").drawImage(newIm,0,0,targetW,targetH);canvases.push(nc);
  prevFrames=canvases;const pvs=$("prevCanvas");const stg=$("stage");pvs.width=stg.clientWidth||480;pvs.height=stg.clientHeight||360;pvs.style.display="block";
  $("prevLabel").textContent="APERÇU · "+canvases.length+" images";$("prevLabel").classList.remove("hide");
  function drawFrame(){if(!prevFrames.length)return;const fr=prevFrames[prevIdx];const sw=pvs.width,sh=pvs.height,fw=fr.width,fh=fr.height;const sc=Math.max(sw/fw,sh/fh);const ox=(sw-fw*sc)/2,oy=(sh-fh*sc)/2;pvs.getContext("2d").drawImage(fr,ox,oy,fw*sc,fh*sc);prevIdx=(prevIdx+1)%prevFrames.length;}
  drawFrame();prevTimer=setInterval(drawFrame,350);
}
async function addFrame(){
  if(!activeTS||!lastShot)return;
  $("keep").disabled=true;
  try{
    stopPrev();$("prevCanvas").style.display="none";$("prevLabel").classList.add("hide");
    const phId="ph_"+uid(),now=Date.now();
    await store.set("ph:"+phId,{data:lastShot.big,created:now,score:+(fLastScore/100).toFixed(2)});
    activeTS.frames.push(phId);activeTS.lastUpdated=now;
    await store.set("ts:"+activeTS.id,activeTS);
    await autoSync(activeTS);
    stopCam();
    await openTS(activeTS.id);// await : navigation complète avant de finir
  }catch(e){
    console.error("[addFrame]",e);
    $("hint").textContent="Erreur Time Frame: "+e.message;
    $("keep").disabled=false;
  }
}

// ── Vidéo complète ────────────────────────────────────────────────────────
let vidTimer=null;
function stopVid(){if(vidTimer){clearInterval(vidTimer);vidTimer=null;}}
$("makeVid").addEventListener("click",async()=>{
  if(!activeTS)return;if(!cvReady){$("vidNote").textContent="Moteur en chargement…";return;}
  const ids=[activeTS.refId,...activeTS.frames].filter(x=>selected.has(x));if(ids.length<2){$("vidNote").textContent="Sélectionne au moins 2 photos.";return;}
  $("vidNote").textContent="Recalage en cours…";$("makeVid").disabled=true;$("saveRow").classList.add("hide");
  const orb=fOrb||new cv.ORB(800);fOrb=orb;const bf=fBf||new cv.BFMatcher(cv.NORM_HAMMING,false);fBf=bf;
  const load=s=>new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=s;});
  const first=await store.get("ph:"+ids[0]);const im0=await load(first.data);const s0=Math.min(1,1024/Math.max(im0.width,im0.height)),W=Math.round(im0.width*s0),Hh=Math.round(im0.height*s0);const c0=document.createElement("canvas");c0.width=W;c0.height=Hh;c0.getContext("2d").drawImage(im0,0,0,W,Hh);const r0=cv.imread(c0),g0=new cv.Mat();cv.cvtColor(r0,g0,cv.COLOR_RGBA2GRAY);r0.delete();const kp0=new cv.KeyPointVector(),d0=new cv.Mat(),m0=new cv.Mat();orb.detectAndCompute(g0,m0,kp0,d0);m0.delete();g0.delete();const rp=[];for(let i=0;i<kp0.size();i++){const p=kp0.get(i).pt;rp.push(p.x,p.y);}kp0.delete();const vidFrames=[c0];
  for(let n=1;n<ids.length;n++){const rec=await store.get("ph:"+ids[n]);const im=await load(rec.data);const s=Math.min(1,1024/Math.max(im.width,im.height));const cw=Math.round(im.width*s),ch=Math.round(im.height*s);const cc=document.createElement("canvas");cc.width=cw;cc.height=ch;cc.getContext("2d").drawImage(im,0,0,cw,ch);let src2=cv.imread(cc),gr=new cv.Mat(),kp=new cv.KeyPointVector(),des=new cv.Mat(),mk=new cv.Mat(),mt=null,sM=null,dM=null,H=null,dst=null,out=null;try{cv.cvtColor(src2,gr,cv.COLOR_RGBA2GRAY);orb.detectAndCompute(gr,mk,kp,des);if(des.rows>=20){mt=new cv.DMatchVectorVector();bf.knnMatch(des,d0,mt,2);const a=[],b=[];for(let i=0;i<mt.size();i++){const mv=mt.get(i);if(mv.size()<2)continue;const x=mv.get(0),y=mv.get(1);if(x.distance<0.75*y.distance){const p=kp.get(x.queryIdx).pt;a.push(p.x,p.y);b.push(rp[x.trainIdx*2],rp[x.trainIdx*2+1]);}}if(a.length/2>=12){sM=cv.matFromArray(a.length/2,1,cv.CV_32FC2,a);dM=cv.matFromArray(b.length/2,1,cv.CV_32FC2,b);H=cv.findHomography(sM,dM,cv.RANSAC,5);if(!H.empty()&&H.rows===3){dst=new cv.Mat();cv.warpPerspective(src2,dst,H,new cv.Size(W,Hh),cv.INTER_LINEAR,cv.BORDER_CONSTANT,new cv.Scalar(0,0,0,255));out=document.createElement("canvas");out.width=W;out.height=Hh;cv.imshow(out,dst);}}}}catch(e){}[src2,gr,kp,des,mk,mt,sM,dM,H,dst].forEach(o=>{try{o&&o.delete&&o.delete();}catch(_){}});vidFrames.push(out||cc);await new Promise(r=>setTimeout(r,0));}d0.delete();
  // Lecture canvas
  const cvs=$("player");cvs.width=W;cvs.height=Hh;cvs.style.display="block";$("hero").style.display="none";const ctx=cvs.getContext("2d");let fi=0;stopVid();vidTimer=setInterval(()=>{ctx.drawImage(vidFrames[fi],0,0,W,Hh);fi=(fi+1)%vidFrames.length;},300);
  $("vidNote").textContent=vidFrames.length+" images · lecture en boucle";$("makeVid").disabled=false;
  // Enregistrement vidéo en arrière-plan via MediaRecorder
  lastVidFrames=vidFrames;lastVidName=activeTS.label.replace(/[^\w\u00C0-\u024F-]/g,"_");
  $("saveRow").classList.remove("hide");
  recordVideo(vidFrames,lastVidName);
});

// Photos + vidéo sauvegardées
let lastVidBlob=null,lastVidFrames=null,lastVidName="timeshot";
function dlBlob(blob,name){const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),2000);}
async function dlDataUrl(dataUrl,name){const r=await fetch(dataUrl);const blob=await r.blob();dlBlob(blob,name);}
$("dlPhoto").addEventListener("click",async()=>{
  if(!activeTS)return;
  const lastPhId=activeTS.frames.length>0?activeTS.frames[activeTS.frames.length-1]:activeTS.refId;
  const ph=await store.get("ph:"+lastPhId);if(!ph)return;
  await dlDataUrl(ph.data,activeTS.label.replace(/[^\w\u00C0-\u024F-]/g,"_")+".jpg");
});
$("dlVid").addEventListener("click",()=>{
  if(lastVidBlob)dlBlob(lastVidBlob,lastVidName+".mp4");
  else if(lastVidFrames)recordVideo(lastVidFrames,lastVidName);
});
async function recordVideo(frames,name){
  if(typeof MediaRecorder==="undefined"){$("vidNote").textContent="MediaRecorder non disponible sur ce navigateur.";return;}
  const mime=["video/mp4","video/webm;codecs=h264","video/webm"].find(t=>{try{return MediaRecorder.isTypeSupported(t);}catch(_){return false;}});
  if(!mime){$("vidNote").textContent="Encodage vidéo non supporté — utilise le long-press sur la photo.";return;}
  const rc=document.createElement("canvas");rc.width=frames[0].width;rc.height=frames[0].height;const rctx=rc.getContext("2d");
  const FPS=3,chunks=[];
  let stream;try{stream=rc.captureStream(FPS);}catch(_){$("vidNote").textContent="captureStream non supporté.";return;}
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:1200000});
  rec.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
  rec.onstop=()=>{
    lastVidBlob=new Blob(chunks,{type:mime});
    const ext=mime.startsWith("video/mp4")?"mp4":"webm";
    $("vidNote").textContent=frames.length+" images · vidéo prête — touche ↓ Vidéo";
    $("dlVid").textContent="↓ Vidéo ("+ext.toUpperCase()+")";
    // Sauvegarde auto : même nom = écrase l'ancienne dans Fichiers
    dlBlob(lastVidBlob,name+"."+ext);
  };
  rec.start(200);
  // Jouer chaque frame 2× pour une durée minimale correcte
  let i=0;const total=frames.length*3;
  function nextFrame(){if(i>=total){rec.stop();return;}rctx.drawImage(frames[i%frames.length],0,0,rc.width,rc.height);i++;setTimeout(nextFrame,Math.round(1000/FPS));}
  nextFrame();
}

if(typeof L==="undefined"){$("map").innerHTML='<div class="empty">Carte non disponible — connexion Internet requise.</div>';$("newBtn").disabled=true;}else{setHub("map");}
})();
